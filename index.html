yId('start-quiz');if(start)start.addEventListener('click',()=>{const mode=document.getElementById('mode-picker').dataset.mode,count=Number(document.getElementById('quiz-count').value),q=buildQuiz(mode,state.selectedTags,count,document.getElementById('wrong-first').checked,document.getElementById('wrong-only').checked);if(!q.questions.length){alert('이 조건에 맞는 단어 또는 예문이 없다. 태그나 시험 방식을 바꿔봐.');return}state.currentQuiz=q;render()});const input=document.getElementById('answer-input');if(input){input.addEventListener('input',e=>{state.currentQuiz.input=e.target.value});input.addEventListener('keydown',e=>{if(e.key==='Enter'&&state.currentQuiz.mode!=='sentence'){e.preventDefault();document.getElementById('check-answer')?.click()}})}document.querySelectorAll('[data-gender]').forEach(b=>b.addEventListener('click',()=>{state.currentQuiz.currentPick=b.dataset.gender;render()}));document.getElementById('check-answer')?.addEventListener('click',evaluateCurrent);document.getElementById('reveal-sentence')?.addEventListener('click',revealSentence);document.querySelectorAll('[data-self-grade]').forEach(b=>b.addEventListener('click',()=>selfGradeSentence(b.dataset.selfGrade==='correct')));document.getElementById('next-question')?.addEventListener('click',nextQuestion);document.querySelectorAll('[data-end-quiz]').forEach(b=>b.addEventListener('click',()=>{if(confirm('현재 시험을 끝낼까?')){state.currentQuiz=null;render()}}));document.getElementById('export-json')?.addEventListener('click',()=>{const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download=`deutsch-quiz-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();setTimeout(()=>URL.revokeObjectURL(url),500)});const imp=document.getElementById('import-json');if(imp)imp.addEventListener('change',async e=>{const f=e.target.files?.[0];if(!f)return;try{const parsed=normalizeData(JSON.parse(await f.text()));if(!confirm(`${parsed.words.length}개 단어가 든 백업으로 현재 데이터를 덮어쓸까?`))return;data=parsed;saveData();render();alert('가져왔어.')}catch(err){alert('올바른 백업 JSON 파일이 아니다.')}});document.getElementById('reset-data')?.addEventListener('click',()=>{if(confirm('현재 단어와 기록을 지우고 교재 001–047로 되돌릴까?')){data=makeBookData();saveData();render()}})}
  document.getElementById('modal').addEventListener('click',e=>{if(e.target.id==='modal')closeSheet()});document.addEventListener('click',e=>{if(e.target.matches('[data-close-sheet]'))closeSheet();const same=e.target.closest('[data-new-same]');if(same){closeSheet();const old=state.currentQuiz;state.currentQuiz=buildQuiz(old.mode,old.tags,old.questions.length,false,false);render()}const home=e.target.closest('[data-go-home]');if(home){closeSheet();state.currentQuiz=null;state.view='home';render()}});if('serviceWorker'in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});render()
})();
